apis:
  - aid: simplifi:simplifi-api
    name: Simplifi by Quicken API
    description: >-
      Simplifi by Quicken provides a consumer personal finance platform that
      connects to financial institutions via OAuth APIs and biller networks via
      purpose-built APIs. Users can aggregate bank accounts, credit cards,
      investment portfolios, and bill accounts to track spending, manage
      budgets, forecast cash flow, and analyze personal financial health. No
      public developer API is currently available; integrations are consumer-
      facing via the Simplifi web and mobile applications.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
